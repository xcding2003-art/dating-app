<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>今晚吃什么？南京美食决策器 💕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#FFf5f5,#FFf0eb);min-height:100vh;color:#2D2D2D}
.max-w-4xl{max-width:900px;margin:0 auto}.mx-auto{margin:0 auto}.px-4{padding-left:16px;padding-right:16px}.pt-6{padding-top:24px}.pb-20{padding-bottom:80px}
.text-center{text-align:center}.mb-8{margin-bottom:32px}.mb-6{margin-bottom:24px}.mb-4{margin-bottom:16px}.mb-3{margin-bottom:12px}.mb-2{margin-bottom:8px}.mb-1{margin-bottom:4px}.mt-1{margin-top:4px}.mt-3{margin-top:12px}.gap-1{gap:4px}.gap-2{gap:8px}
.inline-flex{display:inline-flex}.items-center{align-items:center}.flex-wrap{flex-wrap:wrap}.flex{display:flex}.shrink-0{flex-shrink:0}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.grid{grid-template-columns:1fr 1fr 1fr}}
.text-4xl{font-size:36px}.text-2xl{font-size:24px}.text-sm{font-size:14px}.text-xs{font-size:12px}
.font-bold{font-weight:700}.font-medium{font-weight:500}.font-semibold{font-weight:600}
.rounded-full{border-radius:9999px}.rounded-xl{border-radius:12px}.rounded-lg{border-radius:8px}
.px-3{padding-left:12px;padding-right:12px}.py-1{padding-top:4px;padding-bottom:4px}.py-1-5{padding-top:6px;padding-bottom:6px}

/* Intro gate */
.intro-gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF5F5,#FFF0EB);transition:opacity .35s}
.intro-card{text-align:center;padding:40px}
.intro-emoji{font-size:56px;margin-bottom:16px;animation:floaty 2s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.intro-q{font-size:26px;font-weight:700;color:#2D2D2D;line-height:1.6;margin-bottom:32px}
.intro-btns{position:relative;display:flex;gap:28px;justify-content:center;align-items:center;min-height:56px}
.intro-yes{padding:13px 40px;border-radius:999px;background:linear-gradient(135deg,#FF6B8A,#FF9A7B);color:#fff;font-weight:600;font-size:15px;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(255,107,138,.32);transition:transform .15s}
.intro-yes:active{transform:scale(.96)}
.intro-no{padding:13px 40px;border-radius:999px;background:#fff;color:#999;border:1.5px solid #FFB4C0;font-weight:600;font-size:15px;cursor:pointer;transition:all .15s}
.intro-no.flee{position:fixed;transition:top .25s ease,left .25s ease;z-index:101}

/* Category buttons */
.cat-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500;background:#fff;color:#888;border:1.5px solid #FFE0E6;cursor:pointer;transition:all .15s}
.cat-btn.active,.budget-btn.active,.district-btn.active{background:linear-gradient(135deg,#FF6B8A,#FF9A7B);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(255,107,138,.25)}
.cat-btn:active,.budget-btn:active,.district-btn:active{transform:scale(.95)}
.cat-btn .emoji{font-size:15px}</style>
</head>
<body>
<div id="introGate" class="intro-gate">
  <div class="intro-card">
    <div class="intro-emoji">💕</div>
    <h2 class="intro-q">请问您愿意<br>跟我一起约会吗？</h2>
    <div class="intro-btns" id="introBtns">
      <button class="intro-yes" id="introYes">愿意 💕</button>
      <button class="intro-no" id="introNo">不愿意 🙈</button>
    </div>
  </div>
</div>

<div class="max-w-4xl mx-auto px-4 pt-6 pb-20">
  <header class="text-center mb-8 pt-4">
    <div class="text-4xl mb-2">🍜</div>
    <h1 class="text-2xl font-bold">今晚吃什么<span style="background:linear-gradient(135deg,#FF6B8A,#FF9A7B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">?</span></h1>
    <p class="text-sm mt-1" style="color:#AAA;">南京美食选择困难终结器 💕</p>
    <div class="inline-flex items-center gap-1 mt-3 px-3 py-1 rounded-full text-xs" style="background:#FFF0F3;color:#FF6B8A;">
      <span>📍</span> 南京
    </div>
  </header>

  <section class="mb-6">
    <p class="text-xs font-medium tracking-widest mb-3" style="color:#CCC;">— 选择类型 —</p>
    <div class="flex flex-wrap gap-2" id="categoryRow"></div>
  </section>

  <section class="mb-4">
    <p class="text-xs font-medium tracking-widest mb-2" style="color:#CCC;">— 预算范围 —</p>
    <div class="flex flex-wrap gap-2" id="budgetRow"></div>
  </section>

  <section class="mb-4" id="districtSection">
    <p class="text-xs font-medium tracking-widest mb-2" style="color:#CCC;">— 离你近一点 —</p>
    <div class="flex flex-wrap gap-2" id="districtRow"></div>
  </section>

  <div class="grid" id="cardGrid"></div>

  <div class="text-center py-16 hidden" id="emptyState">
    <div style="font-size:48px;margin-bottom:12px;">🍽️</div>
    <p class="font-medium mb-1" style="color:#555;">这个分类下还没有店铺</p>
    <p class="text-sm" style="color:#BBB;">去别处看看？</p>
  </div>
</div>

<script>
const BUDGETS = [
  { label:"全部", value:"全部" },
  { label:"100以下", value:"100以下" },
  { label:"100-200", value:"100-200" },
  { label:"200-300", value:"200-300" },
  { label:"300以上", value:"300以上" },
];

const DISTRICTS = [
  { label:"全部", value:"全部" },
  { label:"玄武区", value:"玄武区" },
  { label:"鼓楼区", value:"鼓楼区" },
  { label:"秦淮区", value:"秦淮区" },
  { label:"建邺区", value:"建邺区" },
  { label:"浦口区", value:"浦口区" },
];

const CATEGORIES = [
  { label:"全部", emoji:"🧡" },
  { label:"火锅", emoji:"🍲" },
  { label:"烤肉", emoji:"🥩" },
  { label:"日料", emoji:"🍣" },
  { label:"烧烤", emoji:"🍗" },
  { label:"中餐·地方菜", emoji:"🥢" },
  { label:"西餐", emoji:"🍝" },
  { label:"东南亚菜", emoji:"🌴" },
  { label:"其他", emoji:"🔮" },
];

let filters = { category:"全部", budget:"全部", district:"全部" };

function renderCategories() {
  const row = document.getElementById('categoryRow');
  if (!row) return;
  row.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn${filters.category===c.label?' active':''}" data-cat="${c.label}"><span class="emoji">${c.emoji}</span>${c.label}</button>`
  ).join('');
  row.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      filters.category = btn.dataset.cat;
      renderCategories();
      console.log('Category:', filters.category);
    });
  });
}

function renderBudgets() {
  const row = document.getElementById('budgetRow');
  if (!row) return;
  row.innerHTML = BUDGETS.map(b =>
    `<button class="budget-btn${filters.budget===b.value?' active':''}" style="display:inline-flex;align-items:center;padding:6px 14px;border-radius:12px;font-size:13px;font-weight:500;background:#fff;color:#888;border:1.5px solid #FFE0E6;cursor:pointer">${b.label}</button>`
  ).join('');
  row.querySelectorAll('button').forEach((btn,i) => {
    btn.addEventListener('click', () => {
      filters.budget = BUDGETS[i].value;
      renderBudgets();
      console.log('Budget:', filters.budget);
    });
  });
}

function renderDistricts() {
  const row = document.getElementById('districtRow');
  if (!row) return;
  row.innerHTML = DISTRICTS.map(d =>
    `<button class="district-btn${filters.district===d.value?' active':''}" style="display:inline-flex;align-items:center;padding:6px 14px;border-radius:12px;font-size:13px;font-weight:500;background:#fff;color:#888;border:1.5px solid #FFE0E6;cursor:pointer">${d.label}</button>`
  ).join('');
  row.querySelectorAll('button').forEach((btn,i) => {
    btn.addEventListener('click', () => {
      filters.district = DISTRICTS[i].value;
      renderDistricts();
      console.log('District:', filters.district);
    });
  });
}

(function() {
  const yes = document.getElementById('introYes');
  const no = document.getElementById('introNo');
  const gate = document.getElementById('introGate');
  if (!yes||!no||!gate) return;

  no.addEventListener('click', () => { alert('再想想嘛 🙈'); });
  yes.addEventListener('click', () => {
    gate.style.opacity = '0';
    setTimeout(() => {
      gate.style.display = 'none';
      renderCategories();
      renderBudgets();
      renderDistricts();
    }, 350);
  });
})();
</script>
</body>
</html>
