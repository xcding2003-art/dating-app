function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat / 2) ** 2 + Math.cos(a.lat * Math.PI / 180) * Math.cos(b.lat * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}
function distText(s) {
  const d = (userCoord && s.lng != null) ? Math.round(haversineKm(userCoord, { lng: s.lng, lat: s.lat }) * 10) / 10 : s.distance;
  return (d == null) ? "—" : d + "km";
}
function distPrefix() { return userCoord ? "距您" : "距望江悦府"; }

// 状态
let filters = { category: "全部", budget: "全部", district: "全部" };
let filtered = [...shops];

// ═══════════════════════════════════════════════════════
// 渲染：类别行
// ═══════════════════════════════════════════════════════
function renderCategories() {
  const row = document.getElementById('categoryRow');
  row.innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn${filters.category === c.label ? ' active' : ''}" data-cat="${c.label}">
      <span class="emoji">${c.emoji}</span>${c.label}
    </button>
  `).join('');
  row.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      filters.category = btn.dataset.cat;
      renderCategories();
      applyFilters();
    });
  });
}

// ═══════════════════════════════════════════════════════
// 渲染：预算行
// ═══════════════════════════════════════════════════════
function renderBudgets() {
  const row = document.getElementById('budgetRow');
  row.innerHTML = BUDGETS.map(b => `
    <button class="budget-btn${filters.budget === b.value ? ' active' : ''}">${b.label}</button>
  `).join('');
  row.querySelectorAll('button').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      filters.budget = BUDGETS[i].value;
      renderBudgets();
      applyFilters();
    });
  });
}


// ═══════════════════════════════════════════════════════
// 渲染：区域行
// ═══════════════════════════════════════════════════════
function renderDistricts() {
  const row = document.getElementById('districtRow');
  row.innerHTML = DISTRICTS.map(d => `
    <button class="district-btn${filters.district === d.value ? ' active' : ''}">${d.label}</button>
  `).join('');
  row.querySelectorAll('button').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      filters.district = DISTRICTS[i].value;
      renderDistricts();
      applyFilters();
    });
  });
}

// ═══════════════════════════════════════════════════════
// 筛选逻辑
// ═══════════════════════════════════════════════════════
function applyFilters() {
  filtered = shops.filter(s => {
    const catOk  = filters.category === "全部" || s.category === filters.category;
    const budOk  = filters.budget   === "全部" || s.budget   === filters.budget;
    const disOk  = filters.district === "全部" || s.district === filters.district;
    return catOk && budOk && disOk;
  });
  renderSubTags();
  renderCards();
  updateCount();
}

// ═══════════════════════════════════════════════════════
// 子类标签（显示当前类别下有哪些子类）
// ═══════════════════════════════════════════════════════
function renderSubTags() {
  const row = document.getElementById('subTagRow');
  if (filters.category === "全部") {
    row.innerHTML = '';
    return;
  }
  const subs = [...new Set(filtered.map(s => s.subCategory))];
  row.innerHTML = subs.map(sub =>
    `<span class="sub-tag">${sub}</span>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
// 渲染店铺卡片
// ═══════════════════════════════════════════════════════
function renderCards() {
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  grid.innerHTML = filtered.map(s => {
    const bClass = BUDGET_BADGE[s.budget] || 'b-0';
    const bLabel = BUDGET_LABEL[s.budget] || s.budget;
    const grad = CAT_GRADIENT[s.category] || 'linear-gradient(135deg,#FF6B8A,#FF9A7B)';
    return `
    <div class="shop-card fade-up" onclick="showModal(${s.id})">
      <div class="shop-cover" style="background:${grad}">${s.emoji}</div>
      <div class="p-3">
        <div class="flex items-center gap-1.5 mb-2 flex-wrap">
          <span class="sub-tag">${s.subCategory}</span>
          <span class="budget-badge ${bClass}">${bLabel}</span>
        </div>
        <h3 class="font-bold text-sm mb-1 leading-snug" style="color:#2D2D2D;">${s.emoji} ${s.name}</h3>
        <div class="flex items-center gap-1 mb-1">
          <span class="star">★</span>
          <span class="text-xs font-medium" style="color:#E65100;">${s.rating}</span>
          <span class="text-xs ml-1" style="color:#AAA;">人均 ¥${s.avgPrice}</span>
        </div>
        <p class="text-xs" style="color:#AAA;">📍 ${s.district} · ${distPrefix()} ${distText(s)}</p>
        <div class="flex flex-wrap gap-1 mt-1.5">
          ${(s.recommend||[]).map(r=>`<span class="text-[11px] px-1.5 py-0.5 rounded" style="background:#FFF9C4;color:#E65100;">${r}</span>`).join('')}
        </div>
        <p class="text-xs mt-1.5 line-clamp-2" style="color:#888;">${s.desc}</p>
      </div>
    </div>`;
  }).join('');
}

function updateCount() {
  const catText = filters.category === "全部" ? "全品类" : filters.category;
  document.getElementById('resultCount').innerHTML =
    `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium" style="background:#FFF0F3;color:#FF6B8A;">${filtered.length}</span>
    <span style="color:#888;"> 个${catText}选择</span>`;
  document.getElementById('spinHint').textContent = `从 ${filtered.length} 个${catText}店铺中随机选一个`;
}

function resetFilters() {
  filters = { category: "全部", budget: "全部", district: "全部" };
  renderCategories();
  renderBudgets();
  renderDistricts();
  applyFilters();
}

// ═══════════════════════════════════════════════════════
// 随机抽取
// ═══════════════════════════════════════════════════════
let isSpinning = false;

function spinRandom() {
  if (isSpinning) return;
  if (filtered.length === 0) { alert('没有符合条件的店铺~'); return; }

  isSpinning = true;
  const btn  = document.getElementById('spinBtn');
  const dice = document.getElementById('diceIcon');
  btn.disabled = true;
  dice.classList.add('dice-spinning');
  document.getElementById('spinText').textContent = '转转转……';
  closeModal();

  let count = 0;
  const total = 18 + Math.floor(Math.random() * 12);
  const icons = ['🎲', '🍲', '🍜', '🥩', '🍣', '✨', '🎉', '💕'];
  const spin = setInterval(() => {
    dice.textContent = icons[count % icons.length];
    count++;
    if (count >= total) {
      clearInterval(spin);
      isSpinning = false;
      btn.disabled = false;
      dice.classList.remove('dice-spinning');
      dice.textContent = '🎲';
      document.getElementById('spinText').textContent = '随机抽取一个';
      const winner = filtered[Math.floor(Math.random() * filtered.length)];
      showModal(winner.id);
    }
  }, 75);
}

// ═══════════════════════════════════════════════════════
// Modal
// ═══════════════════════════════════════════════════════
function showModal(id) {
  const s = shops.find(x => x.id === id);
  if (!s) return;
  currentModalId = id;

  const bClass = BUDGET_BADGE[s.budget] || 'b-0';
  const bLabel  = BUDGET_LABEL[s.budget] || s.budget;

  const mg = document.getElementById('modalImg');
  mg.style.background = (CAT_GRADIENT[s.category] || 'linear-gradient(135deg,#FF6B8A,#FF9A7B)');
  mg.innerHTML = '<span>' + s.emoji + '</span>';
  document.getElementById('modalDianping').href = 'https://m.dianping.com/search?keyword=' + encodeURIComponent(s.name);
  document.getElementById('modalMeituan').href = 'https://nj.meituan.com/s/' + encodeURIComponent(s.name) + '/';
  document.getElementById('modalSubCat').textContent = `${s.emoji} ${s.subCategory}`;
  document.getElementById('modalBudgetBadge').textContent = bLabel;
  document.getElementById('modalBudgetBadge').className = `budget-badge ${bClass}`;
  document.getElementById('modalRating').textContent = `★ ${s.rating} · 人均 ¥${s.avgPrice}`;
  document.getElementById('modalName').textContent = s.name;
  document.getElementById('modalAddress').textContent = `📍 ${s.address} · ${s.district} · ${distPrefix()} ${distText(s)}`;
  document.getElementById('modalDesc').textContent = s.desc;
  document.getElementById('modalTags').innerHTML =
    (s.recommend||[]).map(t => `<span class="text-xs px-2 py-1 rounded-full" style="background:#FFF9C4;color:#E65100;">${t}</span>`).join('') +
    (s.tags || []).map(t => `<span class="text-xs px-2 py-1 rounded-full" style="background:#FFF0F3;color:#FF6B8A;">${t}</span>`).join('');

  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  currentModalId = null;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function useMyLocation() {
  if (!navigator.geolocation) { alert('当前浏览器不支持定位'); return; }
  const btn = document.getElementById('locBtn');
  const st = document.getElementById('locStatus');
  btn.textContent = '定位中…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      userCoord = { lng: pos.coords.longitude, lat: pos.coords.latitude };
      btn.textContent = '✅已用我的位置 · 点此恢复';
      btn.onclick = resetLocation;
      st.textContent = '距离已按你的实时位置计算';
      renderCards();
      if (currentModalId != null) showModal(currentModalId);
    },
    () => {
      btn.textContent = '📍用我的位置';
      st.textContent = '定位失败（需在 https 或手机浏览器下授权）';
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}
function resetLocation() {
  userCoord = null;
  const btn = document.getElementById('locBtn');
  btn.textContent = '📍用我的位置';
  btn.onclick = useMyLocation;
  document.getElementById('locStatus').textContent = '已恢复默认（望江悦府）';
  renderCards();
  if (currentModalId != null) showModal(currentModalId);
}

// ═══════════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════════
renderCategories();
renderBudgets();
renderDistricts();
applyFilters();

// ═══════════════════════════════════════════════════════
// 开场互动：愿意约会吗
// ═══════════════════════════════════════════════════════
(function () {
  const gate = document.getElementById('introGate');
  const no = document.getElementById('introNo');
  const yes = document.getElementById('introYes');
  if (!gate || !no || !yes) return;
  let noTries = 0;
  const noTexts = ['不愿意 🙈', '再想想嘛 🙈', '真的不愿意吗 🥺', '点愿意好不好 🥺', '就答应他嘛 💕'];

  function fleeNo() {
    noTries++;
    const x = Math.max(16, Math.random() * (window.innerWidth - 180));
    const y = Math.max(16, Math.random() * (window.innerHeight - 90));
    no.classList.add('flee');
    no.style.left = x + 'px';
    no.style.top = y + 'px';
    if (noTries < noTexts.length) no.textContent = noTexts[noTries];
  }
  no.addEventListener('mouseenter', fleeNo);
  no.addEventListener('click', (e) => { e.preventDefault(); fleeNo(); });
  yes.addEventListener('click', () => {
    gate.style.opacity = '0';
    setTimeout(() => { gate.style.display = 'none'; }, 350);
  });
})();

</script>
